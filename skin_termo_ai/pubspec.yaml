name: skin_termo_ai
description: "AI-powered skin disease prediction app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.0.4
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  http: ^1.1.0
  shimmer: ^3.0.0
  animate_do: ^3.1.2
  shared_preferences: ^2.2.2
  tflite_flutter: ^0.11.0
  image: ^4.1.3
  flutter_dotenv: ^5.2.1
  smooth_page_indicator: ^2.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  postgres: ^3.5.9
  flutter_tts: ^4.2.2
  file_picker: ^8.1.3
  flutter_pdfview: ^1.4.4
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/app_logo.png"
  android: true
  ios: true
  android_12:
    image: "assets/images/app_logo.png"
    color: "#ffffff"
